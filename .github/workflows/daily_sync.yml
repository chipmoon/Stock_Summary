name: Daily Trade Sync

on:
  schedule:
    # Chạy hàng ngày lúc 8:00 PM giờ TW
    - cron: '0 12 * * *'
  workflow_dispatch:
    inputs:
      days:
        description: 'Số ngày quét ngược lại (mặc định: 2)'
        required: false
        default: '2'
      since:
        description: 'Quét từ ngày cụ thể (Dịnh dạng: DD-Mon-YYYY, ví dụ: 01-Jan-2026)'
        required: false
        default: ''

jobs:
  sync-trades:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create Google Sheets Key File
        run: |
          echo "${{ secrets.GOOGLE_SHEETS_KEY_JSON }}" > google_key.json

      - name: Run Trade Sync
        env:
          EMAIL_HOST: ${{ secrets.EMAIL_HOST }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_FOLDER: ${{ secrets.EMAIL_FOLDER }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          WORKSHEET_NAME: ${{ secrets.WORKSHEET_NAME }}
          GOOGLE_SHEETS_KEY_FILE: ./google_key.json
          DRY_RUN: 'False'
          PYTHONPATH: .
        run: |
          # Nếu chạy thủ công, sử dụng inputs. Nếu chạy tự động, dùng mặc định
          DAYS="${{ github.event.inputs.days || '2' }}"
          SINCE="${{ github.event.inputs.since || '' }}"
          
          CMD="python src/main.py --days $DAYS"
          if [ -n "$SINCE" ]; then
            CMD="$CMD --since $SINCE"
          fi
          
          echo "Executing: $CMD"
          $CMD
